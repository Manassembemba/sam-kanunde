<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samy Scan - Mes Réseaux</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #fbbf24; /* Couleur dorée */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--accent-color);
            margin-bottom: 15px;
            object-fit: cover;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        p {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-card {
            background-color: var(--card-bg);
            color: var(--text-color);
            text-decoration: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: 600;
            transition: transform 0.2s, background-color 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .link-card:hover {
            transform: scale(1.03);
            background-color: #334155;
            border-color: var(--accent-color);
        }

        .footer {
            margin-top: 50px;
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <div style="font-size: 50px; margin-bottom: 10px;">👤</div>
        <h1>Samy Cann</h1>
        <p>Entrepreneur & Créateur de contenu</p>

        <div class="links-container">
            <a href="https://www.instagram.com/samy_cann" class="link-card" target="_blank">
                📷 Instagram
            </a>
            <a href="https://www.tiktok.com/@samycan01" class="link-card" target="_blank">
                🎵 TikTok
            </a>
            <a href="https://wa.me/message/6EGXXAROIULNH1" class="link-card" target="_blank">
                💬 WhatsApp 
            </a>
        </div>

        <div class="footer">
            © 2026 Samy Cann - Contact Professionnel
        </div>
    </div>

</body>
</html>
